name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: 'Build workflow run ID (from "Build Libraries CI"). Leave empty to use the latest successful run.'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install twine
        run: |
          python -m pip install --upgrade pip
          pip install twine

      - name: Resolve build run ID
        id: resolve-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.build_run_id }}" ]; then
            echo "run_id=${{ inputs.build_run_id }}" >> $GITHUB_OUTPUT
            echo "Using specified run ID: ${{ inputs.build_run_id }}"
          else
            RUN_ID=$(gh run list --workflow="Build Libraries CI" --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
            if [ -z "$RUN_ID" ]; then
              echo "Error: no successful Build Libraries CI run found"
              exit 1
            fi
            echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
            echo "Using latest successful run ID: $RUN_ID"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels
          run-id: ${{ steps.resolve-run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: spine-triton-whl-*

      - name: Flatten artifact structure
        run: |
          mkdir -p dist
          find wheels -name "*.whl" -exec cp {} dist/ \;
          ls -la dist/

      - name: List wheels to publish
        run: |
          echo "Wheels to publish:"
          ls -la dist/*.whl
          echo ""
          echo "Total: $(ls dist/*.whl | wc -l) wheel(s)"

      - name: Configure PyPI repository
        env:
          REPO: ${{ secrets.REPO }}
          USER_NAME: ${{ secrets.USER_NAME }}
          PASSWD: ${{ secrets.PASSWD }}
        run: |
          cat > ~/.pypirc <<EOF
          [distutils]
          index-servers = gitlab

          [gitlab]
          repository = ${REPO}
          username = ${USER_NAME}
          password = ${PASSWD}
          EOF

      - name: Publish to GitLab PyPI
        run: |
          echo "Publishing wheels:"
          ls dist/*.whl
          twine upload --repository gitlab dist/*.whl
