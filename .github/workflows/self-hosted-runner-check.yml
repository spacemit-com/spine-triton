name: Self-hosted Runner Check

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  connectivity-check:
    runs-on:
      group: riscv-runners
    timeout-minutes: 10
    steps:
      - name: Confirm self-hosted runner is reachable
        run: |
          echo "Self-hosted runner is reachable."
          echo "Runner: ${RUNNER_NAME}"
          echo "OS: ${RUNNER_OS}"
